<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Get fastverk</title>
  <style>
    :root {
      --ink: #0d0f12; --panel: #16191f; --line: #262b33;
      --text: #e8eaed; --muted: #9aa2ad; --amber: #f5a623; --amber-ink: #1a1204;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--ink); color: var(--text);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .card {
      width: 100%; max-width: 560px; background: var(--panel);
      border: 1px solid var(--line); border-radius: 16px; padding: 40px;
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .mark {
      width: 40px; height: 40px; border-radius: 10px; background: var(--amber);
      display: grid; place-items: center; color: var(--amber-ink); font-weight: 800; font-size: 22px;
    }
    h1 { font-size: 28px; margin: 0; letter-spacing: -0.02em; }
    p.sub { color: var(--muted); margin: 6px 0 28px; }
    .platforms { display: grid; gap: 14px; }
    .row {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 18px 20px; border: 1px solid var(--line); border-radius: 12px; background: #12151b;
    }
    .row .meta { display: flex; flex-direction: column; }
    .row .name { font-weight: 600; }
    .row .note { color: var(--muted); font-size: 13px; }
    a.btn {
      text-decoration: none; white-space: nowrap; padding: 10px 18px; border-radius: 9px;
      font-weight: 650; font-size: 14px;
    }
    a.primary { background: var(--amber); color: var(--amber-ink); }
    a.ghost { border: 1px solid var(--line); color: var(--text); }
    a.disabled { color: var(--muted); border: 1px solid var(--line); pointer-events: none; opacity: 0.6; }
    footer { margin-top: 26px; color: var(--muted); font-size: 12.5px; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="mark">f</div>
      <h1>fastverk</h1>
    </div>
    <p class="sub">The developer control plane. Get the app for your platform.</p>

    <div class="platforms">
      <div class="row">
        <div class="meta">
          <span class="name">macOS</span>
          <span class="note">Universal (Apple silicon) &middot; menu-bar app + Dashboard</span>
        </div>
        <a class="btn primary" href="/apps/macos/fastverk-latest.dmg">Download .dmg</a>
      </div>

      <div class="row">
        <div class="meta">
          <span class="name">iOS &amp; iPad</span>
          <span class="note">Native meridian console &middot; via TestFlight (internal)</span>
        </div>
        <a class="btn disabled" href="#" aria-disabled="true">TestFlight soon</a>
      </div>
    </div>

    <footer>
      Sign-in is restricted to your fastverk account.
      &middot; <a href="https://app.fastverk.com">Open the web console</a>
    </footer>
  </main>
</body>
</html>
